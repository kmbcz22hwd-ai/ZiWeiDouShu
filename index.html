<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>紫微斗數｜完整命盤</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{
  --ink:#12100a;--bg:#f0ebe0;--gold:#b8923a;--gold-lt:#e8d5a0;--gold-pale:#faf6eb;
  --jade:#2a5e50;--jade-lt:#e4f0ec;--rust:#7d3520;--mist:#6b7280;--border:#d6c99a;--card:#fffdf6;
  --purple:#5a3d7a;--purple-lt:#ece4f2;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
header{background:var(--ink);padding:18px 20px;display:flex;align-items:center;gap:12px;}
.logo{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;width:36px;height:36px;padding:4px;border:1.5px solid var(--gold);}
.logo span{background:var(--gold);opacity:.5;}
.logo span:nth-child(5){opacity:1;}
header h1{font-family:'Noto Serif TC',serif;color:var(--gold);font-size:1.05rem;letter-spacing:.1em;}
header p{color:rgba(255,255,255,.4);font-size:.68rem;margin-top:2px;}
.tab-bar{background:var(--ink);display:flex;border-top:1px solid rgba(255,255,255,.08);}
.nav-a{flex:1;text-align:center;padding:10px;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2px solid transparent;font-size:.85rem;}
.nav-a.on{color:var(--gold);border-bottom-color:var(--gold);}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 80px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--purple));}
.card-title{font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:14px;letter-spacing:.06em;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.field label{display:block;font-size:.72rem;color:var(--mist);margin-bottom:4px;}
.field select,.field input{width:100%;border:1px solid var(--border);background:var(--bg);padding:9px 10px;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;color:var(--ink);border-radius:4px;outline:none;}
.field select:focus,.field input:focus{border-color:var(--gold);}
.btn{width:100%;padding:13px;background:var(--ink);color:var(--gold);border:none;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;letter-spacing:.1em;cursor:pointer;margin-top:10px;}
.btn:hover{background:#2d2010;}
.palace-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,auto);gap:3px;margin-bottom:16px;background:var(--border);border:2px solid var(--border);border-radius:4px;overflow:hidden;}
.p-cell{background:var(--card);padding:6px;min-height:88px;position:relative;font-size:.68rem;}
.p-cell.center{grid-column:2/4;grid-row:2/4;background:var(--purple-lt);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px;}
.p-cell .pc-zhi{position:absolute;top:3px;right:5px;font-size:.6rem;color:var(--mist);}
.p-cell .pc-name{font-weight:700;color:var(--purple);font-size:.72rem;margin-bottom:3px;}
.p-cell.self .pc-name{color:var(--rust);}
.p-cell.self{background:#fff3ee;}
.p-cell .pc-stars{line-height:1.5;}
.pc-star{display:inline-block;margin-right:3px;}
.pc-star.main{color:var(--gold);font-weight:700;}
.pc-star.lucky{color:var(--jade);}
.page-nav{display:flex;overflow-x:auto;gap:0;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px;}
.pnav-btn{flex-shrink:0;padding:7px 12px;border:none;background:transparent;border-radius:4px;font-size:.75rem;cursor:pointer;color:var(--mist);font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.pnav-btn.on{background:var(--ink);color:var(--gold);font-weight:700;}
.page{display:none;}.page.on{display:block;}
.sec{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:18px;margin-bottom:12px;}
.sec-head{font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:22px;height:22px;background:var(--purple);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;}
.sec-body{font-size:.86rem;line-height:1.95;color:#2a200e;}
.sec-body p{margin-bottom:8px;}
.hl{font-weight:700;color:var(--purple);}
.warn{font-weight:700;color:var(--rust);}
.gold{font-weight:700;color:var(--gold);}
.tip{background:var(--purple-lt);border-left:3px solid var(--purple);padding:10px 14px;border-radius:0 4px 4px 0;margin-top:10px;font-size:.84rem;line-height:1.8;}
.export-bar{background:var(--ink);border-radius:6px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.export-bar p{color:rgba(255,255,255,.6);font-size:.82rem;}
.ebtn{background:var(--gold);color:var(--ink);border:none;padding:9px 16px;border-radius:4px;font-size:.8rem;font-weight:700;cursor:pointer;}
.daxian-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin:10px 0;}
.daxian-item{flex-shrink:0;width:76px;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:8px 4px;text-align:center;}
.daxian-item.current{border-color:var(--gold);background:var(--gold-pale);}
.daxian-item .dx-age{font-size:.64rem;color:var(--mist);margin-bottom:4px;}
.daxian-item .dx-name{font-family:'Noto Serif TC',serif;font-size:.85rem;font-weight:700;color:var(--purple);}
@media(max-width:480px){
  .row2,.row3,.row4{grid-template-columns:1fr 1fr;}
  .p-cell{min-height:76px;font-size:.62rem;padding:4px;}
}
</style>

<script>
var lunarInfo=[0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,

0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b5a0,0x195a6,
0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,
0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0];

function lYearDays(y){
  var sum=348;
  for(var i=0x8000;i>0x8;i>>=1) sum+=(lunarInfo[y-1900]&i)?1:0;
  return sum+leapDays(y);
}
function leapMonth(y){ return lunarInfo[y-1900]&0xf; }
function leapDays(y){
  if(leapMonth(y)) return (lunarInfo[y-1900]&0x10000)?30:29;
  return 0;
}
function monthDays(y,m){
  return (lunarInfo[y-1900]&(0x10000>>m))?30:29;
}
function solar2lunar(sy,sm,sd){
  var baseDate=new Date(1900,0,31);
  var objDate=new Date(sy,sm-1,sd);
  var offset=Math.floor((objDate-baseDate)/86400000);
  var lY=1900,daysInYear;
  for(lY=1900; lY<2050 && offset>0; lY++){
    daysInYear=lYearDays(lY);
    if(offset<daysInYear) break;
    offset-=daysInYear;
  }
  var leap=leapMonth(lY);
  var isLeap=false;
  var lM=1,daysInMonth;
  for(lM=1; lM<=13 && offset>0; lM++){
    if(leap>0 && lM===(leap+1) && !isLeap){
      lM--; isLeap=true; daysInMonth=leapDays(lY);
    } else {
      daysInMonth=monthDays(lY,lM);
    }
    if(offset<daysInMonth) break;
    offset-=daysInMonth;
    if(isLeap && lM===(leap+1)) isLeap=false;
  }
  var lD=offset+1;
  return {year:lY, month:lM, day:lD, isLeap:isLeap};
}

var GAN=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var ANIMAL=['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'];
var PALACE_NAMES=['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','交友','官祿','田宅','福德','父母'];

function getYearGanZhi(y){
  var g=(y-4)%10; if(g<0)g+=10;
  var z=(y-4)%12; if(z<0)z+=12;
  return {gan:g, zhi:z};
}

function getMingGong(lunarMonth, hourIdx){
  var start=(2+lunarMonth-1)%12;
  var mg=((start - hourIdx)%12+12)%12;
  return mg;
}
function getShenGong(lunarMonth, hourIdx){
  var start=(2+lunarMonth-1)%12;
  var sg=((start + hourIdx)%12+12)%12;
  return sg;
}

function getMingGongGan(yearGanIdx, mingGongZhiIdx){
  var startGan=[2,4,6,8,0][yearGanIdx%5];
  var offset=(mingGongZhiIdx-2+12)%12;
  return (startGan+offset)%10;
}

var NAYIN={
  '甲子':'金','乙丑':'金','丙寅':'火','丁卯':'火','戊辰':'木','己巳':'木','庚午':'土','辛未':'土','壬申':'金','癸酉':'金',
  '甲戌':'火','乙亥':'火','丙子':'水','丁丑':'水','戊寅':'土','己卯':'土','庚辰':'金','辛巳':'金','壬午':'木','癸未':'木',
  '甲申':'水','乙酉':'水','丙戌':'土','丁亥':'土','戊子':'火','己丑':'火','庚寅':'木','辛卯':'木','壬辰':'水','癸巳':'水',
  '甲午':'金','乙未':'金','丙申':'火','丁酉':'火','戊戌':'木','己亥':'木','庚子':'土','辛丑':'土','壬寅':'金','癸卯':'金',
  '甲辰':'火','乙巳':'火','丙午':'水','丁未':'水','戊申':'土','己酉':'土','庚戌':'金','辛亥':'金','壬子':'木','癸丑':'木',
  '甲寅':'水','乙卯':'水','丙辰':'土','丁巳':'土','戊午':'火','己未':'火','庚申':'木','辛酉':'木','壬戌':'水','癸亥':'水'
};
var WUXINGJU={'水':2,'木':3,'金':4,'土':5,'火':6};

function getWuxingJu(yearGanIdx, mingGongZhiIdx){
  var mgGanIdx=getMingGongGan(yearGanIdx, mingGongZhiIdx);
  var ganzhi=GAN[mgGanIdx]+ZHI[mingGongZhiIdx];
  var wx=NAYIN[ganzhi]||'土';
  return {ju:WUXINGJU[wx], wx:wx, ganzhi:ganzhi};
}

function getZiweiPos(ju, lunarDay){
  var n=lunarDay, j=ju;
  var full=Math.ceil(n/j)*j;
  var borrow=full-n;
  var shang=full/j;
  var zwIdx=(shang-1)%12;
  if(borrow>0){
    if(borrow%2===0){ zwIdx=(zwIdx+borrow)%12; }
    else { zwIdx=((zwIdx-borrow)%12+12)%12; }
  }
  return zwIdx;
}
function ziweiToZhiIdx(zwIdxFromYin){ return (2+zwIdxFromYin)%12; }

var ZIWEI_OFFSETS={'紫微':0,'天機':-1,'太陽':-3,'武曲':-4,'天同':-5,'廉貞':-8};
var TIANFU_OFFSETS={'天府':0,'太陰':1,'貪狼':2,'巨門':3,'天相':4,'天梁':5,'七殺':6,'破軍':10};

function getTianfuZhiIdx(ziweiZhiIdx){
  var map={0:8,1:7,2:6,3:5,4:4,5:3,6:2,7:1,8:0,9:11,10:10,11:9};
  var zwFromYin=(ziweiZhiIdx-2+12)%12;
  var tfFromYin=map[zwFromYin];
  return (2+tfFromYin)%12;
}

function placeMainStars(ziweiZhiIdx){
  var stars={};
  Object.keys(ZIWEI_OFFSETS).forEach(function(name){
    stars[name]=((ziweiZhiIdx+ZIWEI_OFFSETS[name])%12+12)%12;
  });
  var tianfuZhiIdx=getTianfuZhiIdx(ziweiZhiIdx);
  Object.keys(TIANFU_OFFSETS).forEach(function(name){
    stars[name]=(tianfuZhiIdx+TIANFU_OFFSETS[name])%12;
  });
  return stars;
}

function placeAuxStars(yearGanIdx, yearZhiIdx, lunarMonth, hourIdx){
  var aux={};
  aux['左輔']=(4+lunarMonth-1)%12;
  aux['右弼']=((10-lunarMonth+1)%12+12)%12;
  aux['文昌']=((10-hourIdx)%12+12)%12;

function runZiwei(){

  var yg=getYearGanZhi(y);
  var mingGongZhi=getMingGong(lunar.month, hourIdx);
  var shenGongZhi=getShenGong(lunar.month, hourIdx);

  var zwFromYin=getZiweiPos(juInfo.ju, lunar.day);

  var auxStars=placeAuxStars(yg.gan, yg.zhi, lunar.month, hourIdx);

  var mingZhu=mingZhuMap[mingGongZhi];
  var shenZhu=shenZhuMap[shenGongZhi];

  var yangYear=(yg.gan%2===0);
  var isMale=(gender==='male');
  var shunxing=(yangYear&&isMale)||(!yangYear&&!isMale);
  var daxians=[];
  for(var i=0;i<12;i++){
    var pZhi=shunxing?(mingGongZhi+i)%12:((mingGongZhi-i)%12+12)%12;

var STRONG_STARS=['武曲','七殺','破軍','貪狼'];
function judgeGrade(starsObj, sihua){
  var mains=starsObj.mains;
  if(mains.length===0) return {grade:'平',desc:'無主星坐守，運勢起伏不大，較容易受環境或身邊的人影響。'};
  var hasGood=mains.some(function(n){return GOOD_STARS.indexOf(n)>=0;});
  var hasStrong=mains.some(function(n){return STRONG_STARS.indexOf(n)>=0;});
  var hasJi=mains.some(function(n){return sihua['忌']===n;});
  var hasLu=mains.some(function(n){return sihua['祿']===n;});
  if(hasJi) return {grade:'需留意',desc:'主星化忌，這個領域容易遇到波折與考驗，需要更多耐心和智慧去化解。'};
  if(hasLu||(hasGood&&!hasStrong)) return {grade:'佳',desc:'主星帶吉，這個領域運勢順遂，容易得到好的際遇與發展。'};
  if(hasStrong) return {grade:'中上（動盪帶機運）',desc:'主星帶煞氣但也帶衝勁，這個領域起伏較大，但也充滿突破與開創的機會。'};
  return {grade:'平順',desc:'整體運勢平穩，沒有特別突出，也沒有明顯的凶象。'};
}

function getPalaceDeepDetail(palaceType, starsObj){
  if(starsObj.mains.length===0) return null;
  var details=[];
  starsObj.mains.forEach(function(n){
    var d=PALACE_STAR_DETAIL[palaceType]&&PALACE_STAR_DETAIL[palaceType][n];
    if(d) details.push({star:n, now:d.now, future:d.future});
  });
  return details.length>0?details:null;
}

// 六煞星檢查：擎羊、陀羅、火星、鈴星（文昌文曲化忌另計）
var SHA_XING=['擎羊','陀羅','火星','鈴星'];
function checkShaXing(starsObj){
  var found=starsObj.auxs.filter(function(n){return SHA_XING.indexOf(n)>=0;});
  return found.length>0?found.join('、'):null;
}

    html+='<div class="tip">無論宮位星曜強弱，親情的緣分深淺不能只看命盤，用心經營和陪伴才是關係長久的關鍵。</div>';
    html+='</div></div>';
  }

  if(id==='p12'){
    var currentAge=z.analYear-z.y;
    html+='<div class="sec"><div class="sec-head"><div class="sec-icon">十二</div>大限與流年</div>';
    html+='<div class="sec-body"><p>五行局：<span class="hl">'+z.juWx+z.ju+'局</span>　起運年齡：<span class="hl">'+z.ju+'歲</span>　行運方向：<span class="hl">'+(z.shunxing?'順行':'逆行')+'</span></p></div>';
    html+='<div class="daxian-row">';
    z.daxians.forEach(function(dx){
      var isCurrent=(currentAge>=dx.startAge&&currentAge<=dx.endAge);
      html+='<div class="daxian-item'+(isCurrent?' current':'')+'">'+
        '<div class="dx-age">'+dx.startAge+'～'+dx.endAge+'歲</div>'+
        '<div class="dx-name">'+PALACE_NAMES[dx.palaceIdx]+'</div>'+
        '<div style="font-size:.6rem;color:var(--mist)">'+ZHI[dx.zhiIdx]+'宮</div>'+
        '</div>';
    });
    html+='</div>';
    var currentDx=null;
    for(var ci=0;ci<z.daxians.length;ci++){
      if(currentAge>=z.daxians[ci].startAge&&currentAge<=z.daxians[ci].endAge){ currentDx=z.daxians[ci]; break; }
    }
    if(currentDx){
      var dxStars=getPalaceStars(z,currentDx.zhiIdx);
      html+='<div class="sec-body"><p><span class="hl">當前大限（'+currentDx.startAge+'～'+currentDx.endAge+'歲，大限'+PALACE_NAMES[currentDx.palaceIdx]+'）：</span></p>';
      html+='<p>這個大限走的是你命盤的「'+PALACE_NAMES[currentDx.palaceIdx]+'」宮位，'+(dxStars.mains.length>0?'主星為'+dxStars.mains.join('、')+'，':'')+'代表這十年的人生重心和機運方向會圍繞著'+PALACE_NAMES[currentDx.palaceIdx]+'所代表的意義展開。</p></div>';
    }
    html+='</div>';
  }

  if(id==='p13'){
    var mingStars3=getPalaceStars(z,z.mingGongZhi);
    html+='<div class="sec"><div class="sec-head"><div class="sec-icon">結</div>綜合建議</div><div class="sec-body">';
    html+='<p class="hl">給'+z.name+'的命盤總結：</p>';
    html+='<p>命宮'+(mingStars3.mains.length>0?'主星「'+mingStars3.mains.join('、')+'」':'借對宮星曜')+'，五行'+z.juWx+z.ju+'局，這是你這輩子的能量基調。</p>';
    var jiStarPalace=null;
    Object.keys(z.mainStars).forEach(function(n){ if(z.sihua['忌']===n){
      for(var pi=0;pi<12;pi++){ if(getPalaceZhi(z.mingGongZhi,pi)===z.mainStars[n]){ jiStarPalace=PALACE_NAMES[pi]; break; } }
    }});
    if(jiStarPalace) html+='<p>化忌落在「'+jiStarPalace+'」，這是你這輩子最需要用心經營的課題，同時也是突破後最能帶來成長的地方。</p>';
    html+='<p style="margin-top:10px"><span class="hl">'+z.analYear+'年整體建議：</span></p>';
    var currentAge2=z.analYear-z.y;
    var currentDx2=null;
    for(var cj=0;cj<z.daxians.length;cj++){
      if(currentAge2>=z.daxians[cj].startAge&&currentAge2<=z.daxians[cj].endAge){ currentDx2=z.daxians[cj]; break; }
    }
    if(currentDx2) html+='<p>目前走「'+PALACE_NAMES[currentDx2.palaceIdx]+'」大限，是人生重心放在這個面向的十年，建議把握這段時間的能量，專注在相對應的人生課題上。</p>';
    html+='<div class="tip">紫微斗數看的是先天格局與後天運勢的交織，命盤給的是方向和提醒，真正的人生還是掌握在自己手上，用心生活，命盤只會是輔助，不會是限制。</div>';
    html+='</div></div>';
  }

  return html;
}

function centerInfo(){
  var z=ZW;
  return '<div style="font-family:\'Noto Serif TC\',serif;font-weight:700;color:var(--purple);font-size:.9rem;margin-bottom:6px;">'+z.name+'</div>'+
    '<div style="font-size:.68rem;color:var(--mist);">'+z.y+'/'+z.m+'/'+z.d+'</div>'+
    '<div style="font-size:.68rem;color:var(--mist);margin-top:2px;">'+z.juWx+z.ju+'局</div>';
}

(function(){
  var yearSel=document.getElementById('f-year');
  for(var y=2010;y>=1930;y--){
    var o=document.createElement('option');
    o.value=y;o.textContent=y+'年';
    yearSel.appendChild(o);
  }
  var daySel=document.getElementById('f-day');
  for(var d=1;d<=31;d++){
    var o2=document.createElement('option');
    o2.value=d;o2.textContent=d+'日';
    daySel.appendChild(o2);
  }
  var analSel=document.getElementById('f-anal-year');
  var cy=new Date().getFullYear();
  for(var ay=cy-1;ay<=cy+3;ay++){
    var o3=document.createElement('option');
    o3.value=ay;o3.textContent=ay+'年';
    if(ay===cy)o3.selected=true;
    analSel.appendChild(o3);
  }
})();

function copyText(t){if(!t||!t.trim()){alert('請先起盤');return;}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){alert('已複製！');}).catch(function(){fbCopy(t);});}else{fbCopy(t);}}
function fbCopy(t){var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');alert('已複製！');}catch(e){alert('請手動複製');}document.body.removeChild(ta);}
function copyCurrentPage(){var p=document.querySelector('.page.on');if(!p){alert('請先起盤');return;}var h=p.querySelector('.sec-head');var b=p.querySelector('.sec-body')||p;var ti=h?h.textContent.trim():'';var bo=(b.innerText||b.textContent).trim();copyText(ti+'\n\n'+bo);}
function copyAll(){if(!ZW){alert('請先起盤');return;}var arr=['紫微斗數命盤報告',ZW.name+'｜'+ZW.y+'/'+ZW.m+'/'+ZW.d,'命宮：'+ZHI[ZW.mingGongZhi]+'　五行局：'+ZW.juWx+ZW.ju+'局',''];document.querySelectorAll('.page').forEach(function(p){var h=p.querySelector('.sec-head');var b=p.querySelector('.sec-body')||p;if(h&&b){arr.push(h.textContent.trim());arr.push((b.innerText||b.textContent).trim());arr.push('');}});copyText(arr.join('\n'));}

function goNav(view, el){
  document.querySelectorAll('.nav-a').forEach(function(a){
    a.classList.remove('on');
    a.style.color='rgba(255,255,255,.5)';
    a.style.borderBottomColor='transparent';
  });
  el.classList.add('on');
  el.style.color='var(--gold)';
  el.style.borderBottomColor='var(--gold)';
  document.getElementById('analyze-view').style.display = view==='analyze' ? '' : 'none';
  document.getElementById('crm-view').style.display = view==='crm' ? '' : 'none';
  if(view==='crm') renderClients();
}

var clients=JSON.parse(localStorage.getItem('mp_clients')||'[]');
var editIdx=-1;

function renderClients(){
  var el=document.getElementById('client-list');
  if(!clients.length){
    el.innerHTML='<div style="text-align:center;padding:40px;color:var(--mist);font-size:.88rem;">尚未新增任何客戶</div>';
    return;
  }
  el.innerHTML='';
  clients.forEach(function(c,i){
    var div=document.createElement('div');
    div.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;';
    div.innerHTML='<div><h3 style="font-size:.92rem;font-weight:700;margin-bottom:4px;">'+c.name+'</h3>'+
      '<p style="font-size:.78rem;color:var(--mist);line-height:1.6;">'+(c.phone||'')+(c.note?' ｜ '+c.note:'')+'</p></div>'+
      '<div style="display:flex;gap:6px;flex-shrink:0;">'+
      '<button onclick="loadClient('+i+')" style="padding:6px 12px;border:1px solid var(--purple);border-radius:3px;font-size:.75rem;cursor:pointer;background:var(--purple);color:#fff;">起盤</button>'+
      '<button onclick="editClient('+i+')" style="padding:6px 12px;border:1px solid var(--border);border-radius:3px;font-size:.75rem;cursor:pointer;background:var(--bg);">編輯</button>'+
      '<button onclick="delClient('+i+')" style="padding:6px 12px;border:1px solid var(--border);border-radius:3px;font-size:.75rem;cursor:pointer;background:var(--bg);">刪除</button>'+
      '</div>';
    el.appendChild(div);
  });
}
function openAddClient(){
  editIdx=-1;
  document.getElementById('modal-title').textContent='新增客戶';
  ['c-name','c-phone','c-year','c-month','c-day','c-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('client-modal').style.display='flex';
}
function editClient(i){
  editIdx=i;
  var c=clients[i];
  document.getElementById('modal-title').textContent='編輯客戶';
  document.getElementById('c-name').value=c.name||'';
  document.getElementById('c-phone').value=c.phone||'';
  document.getElementById('c-year').value=c.year||'';
  document.getElementById('c-month').value=c.month||'';
  document.getElementById('c-day').value=c.day||'';
  document.getElementById('c-note').value=c.note||'';
  document.getElementById('client-modal').style.display='flex';
}
function closeModal(){ document.getElementById('client-modal').style.display='none'; }
function saveClient(){
  var c={
    name:document.getElementById('c-name').value.trim(),
    phone:document.getElementById('c-phone').value.trim(),
    year:document.getElementById('c-year').value.trim(),
    month:document.getElementById('c-month').value.trim(),
    day:document.getElementById('c-day').value.trim(),
    note:document.getElementById('c-note').value.trim()
  };
  if(!c.name){alert('請輸入姓名');return;}
  if(editIdx>=0){ c=Object.assign({},clients[editIdx],c); clients[editIdx]=c; }
  else clients.push(c);
  localStorage.setItem('mp_clients',JSON.stringify(clients));
  closeModal();
  renderClients();
}
function delClient(i){
  if(!confirm('確定刪除「'+clients[i].name+'」？')) return;
  clients.splice(i,1);
  localStorage.setItem('mp_clients',JSON.stringify(clients));
  renderClients();
}
function loadClient(i){
  var c=clients[i];
  document.getElementById('f-name').value=c.name||'';
  if(c.year) document.getElementById('f-year').value=c.year;
  if(c.month) document.getElementById('f-month').value=c.month;
  if(c.day) document.getElementById('f-day').value=c.day;
  if(c.gender) document.getElementById('f-gender').value=c.gender;
  if(c.status) document.getElementById('f-status').value=c.status;
  goNav('analyze', document.querySelectorAll('.nav-a')[0]);
  window.scrollTo(0,0);
}
</script>
